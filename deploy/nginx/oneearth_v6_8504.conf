# Nginx example (optional): serve frontend static files directly and proxy API.
#
# This avoids the "static assets are 502" failure mode by eliminating any
# frontend upstream process. Nginx serves `frontend/dist` from disk.
#
# Assumptions:
# - Built dist is copied to /opt/oneearth/frontend/dist
# - Backend API runs on 127.0.0.1:8505 (run_backend.sh or systemd)
# - Nginx listens on :8504

server {
    listen 8504;
    server_name _;

    root /opt/oneearth/frontend/dist;
    index index.html;

    # Static assets (including Cesium copied by vite-plugin-cesium)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Avoid duplicate CORS headers (backend may also set Access-Control-*).
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # CORS (when frontend origin differs by port)
        # Adjust this to your actual frontend origin (or implement an allowlist via `map`).
        add_header 'Access-Control-Allow-Origin' 'http://47.245.113.151:8506' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'http://47.245.113.151:8506' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        # Keep the original URI (/api/...) when proxying.
        # NOTE: If proxy_pass ends with '/', nginx strips the matching location prefix,
        # which would incorrectly map /api/tiles -> /tiles (breaking the backend routes).
        proxy_pass http://127.0.0.1:8505;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8505/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }
}
