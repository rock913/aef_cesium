# Nginx HTTPS example for DuckDNS domain (recommended for WebGPU / secure context)
#
# Goal:
# - Serve frontend dist from disk
# - Proxy /api to backend
# - Provide HTTPS on standard port 443
#
# Prereqs:
# - DNS: metelligence.duckdns.org -> your server public IP
# - Certs: /etc/letsencrypt/live/metelligence.duckdns.org/{fullchain.pem,privkey.pem}
# - Frontend dist path: /opt/oneearth/cesium_app_v6/current/frontend/dist
# - Backend: 127.0.0.1:8507
#
# Notes:
# - WebGPU requires a secure context (HTTPS or localhost) in major browsers.
# - Using a bare IP address with HTTPS is not supported by Let's Encrypt.

server {
    listen 80;
    server_name metelligence.duckdns.org;

    # Optional: allow ACME HTTP-01 challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name metelligence.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/metelligence.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metelligence.duckdns.org/privkey.pem;

    # Recommended TLS settings (minimal; tune as needed)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/oneearth/cesium_app_v6/current/frontend/dist;
    index index.html;

    # SPA + static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API (same-origin, so CORS is typically unnecessary)
    location /api/ {
        proxy_pass http://127.0.0.1:8507;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8507/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }
}
