# Nginx production example: serve frontend dist + proxy /api to backend.
#
# - Nginx listens on :8506
# - Frontend built dist is served from /opt/oneearth/cesium_app_v6/current/frontend/dist
# - Backend API runs on 127.0.0.1:8507 (systemd)

server {
    listen 8506;
    server_name _;

    root /opt/oneearth/cesium_app_v6/current/frontend/dist;
    index index.html;

    # SPA + static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        # Avoid duplicate CORS headers (backend may also set Access-Control-*).
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # CORS (when frontend origin differs by port, e.g. :8506 vs :80)
        # Adjust this to your actual frontend origin (or implement an allowlist via `map`).
        add_header 'Access-Control-Allow-Origin' 'http://47.245.113.151:8506' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'http://47.245.113.151:8506' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        proxy_pass http://127.0.0.1:8507;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health passthrough (optional)
    location /health {
        proxy_pass http://127.0.0.1:8507/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }
}
