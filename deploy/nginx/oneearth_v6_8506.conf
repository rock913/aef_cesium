# Nginx production example: serve frontend dist + proxy /api to backend.
#
# - Nginx listens on :8506
# - Frontend built dist is served from /opt/oneearth/cesium_app_v6/current/frontend/dist
# - Backend API runs on 127.0.0.1:8507 (systemd)

server {
    listen 8506;
    server_name _;

    root /opt/oneearth/cesium_app_v6/current/frontend/dist;
    index index.html;

    # SPA + static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8507;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health passthrough (optional)
    location /health {
        proxy_pass http://127.0.0.1:8507/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }
}
