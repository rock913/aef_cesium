name: Deploy (Production 8506/8507)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/SHA)"
        required: true
        default: "main"
      release_id:
        description: "Release id (leave empty to auto-generate)"
        required: false
        default: ""

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    env:
      PROD_PATH: ${{ secrets.PROD_PATH }}
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
      BACKEND_SERVICE: ${{ secrets.PROD_BACKEND_SERVICE || 'oneearth-v6-backend-8507' }}
      HEALTH_URL: ${{ secrets.PROD_HEALTH_URL || 'http://127.0.0.1:8507/health' }}
      FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL || 'http://127.0.0.1:8506/' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Compute release id
        id: rel
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=8 HEAD)"
          ts="$(date -u +'%Y%m%d_%H%M%S')"
          if [ -n "${{ inputs.release_id }}" ]; then
            rid="${{ inputs.release_id }}"
          else
            rid="${ts}_${short_sha}"
          fi
          echo "release_id=$rid" >> "$GITHUB_OUTPUT"
          echo "Resolved release_id=$rid"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Backend tests (fast stubs)
        run: make test-fast

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Frontend build
        working-directory: frontend
        env:
          VITE_ACCESS_PASSWORD: ${{ secrets.VITE_ACCESS_PASSWORD }}
        run: npm run build

      - name: Create release archive
        id: pkg
        run: |
          set -euo pipefail
          rid="${{ steps.rel.outputs.release_id }}"
          archive="release_${rid}.tar.gz"

          tar -czf "$archive" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='backend/venv' \
            --exclude='frontend/node_modules' \
            --exclude='logs' \
            --exclude='**/__pycache__' \
            --exclude='**/.pytest_cache' \
            backend frontend/dist deploy run_backend.sh run_prod_single.sh Makefile pytest.ini README.md QUICK_REFERENCE.md

          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "Created $archive"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error

      - name: Start ssh-agent + add deploy key
        shell: bash
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_KEY_B64: ${{ secrets.PROD_SSH_KEY_B64 }}
          PROD_SSH_PASSPHRASE: ${{ secrets.PROD_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Start agent and persist env for later steps.
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          key_path="$HOME/.ssh/id_oneearth_deploy"

          if [ -n "${PROD_SSH_KEY_B64}" ]; then
            echo "Using PROD_SSH_KEY_B64"
            echo "$PROD_SSH_KEY_B64" | base64 -d > "$key_path"
          else
            echo "Using PROD_SSH_KEY"
            if [ -z "${PROD_SSH_KEY}" ]; then
              echo "❌ Missing PROD_SSH_KEY (or PROD_SSH_KEY_B64)"
              exit 1
            fi
            printf '%s' "$PROD_SSH_KEY" > "$key_path"
          fi

          # Normalize possible CRLF (common when copying secrets from Windows).
          sed -i 's/\r$//' "$key_path"
          chmod 600 "$key_path"

          # Add key to agent (supports optional passphrase via SSH_ASKPASS).
          if [ -n "${PROD_SSH_PASSPHRASE}" ]; then
            askpass="$RUNNER_TEMP/ssh-askpass.sh"
            printf '%s\n' '#!/usr/bin/env sh' 'echo "$PROD_SSH_PASSPHRASE"' > "$askpass"
            chmod 700 "$askpass"
            DISPLAY=:0 SSH_ASKPASS="$askpass" SSH_ASKPASS_REQUIRE=force ssh-add "$key_path" </dev/null
          else
            ssh-add "$key_path"
          fi

      - name: Add known hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.PROD_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.PROD_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PROD_SSH_PORT}" -H "${PROD_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Upload archive to server
        run: |
          set -euo pipefail
          rid="${{ steps.rel.outputs.release_id }}"
          archive="${{ steps.pkg.outputs.archive }}"
          remote_incoming="${PROD_PATH}/incoming"
          ssh -p "${PROD_SSH_PORT}" "${PROD_USER}@${PROD_HOST}" "mkdir -p '${remote_incoming}' '${PROD_PATH}/releases'"
          scp -P "${PROD_SSH_PORT}" "$archive" "${PROD_USER}@${PROD_HOST}:${remote_incoming}/${rid}.tar.gz"

      - name: Deploy on server (extract + switch + restart + healthcheck)
        run: |
          set -euo pipefail
          rid="${{ steps.rel.outputs.release_id }}"
          ssh -p "${PROD_SSH_PORT}" "${PROD_USER}@${PROD_HOST}" "set -euo pipefail; \
            base='${PROD_PATH}'; \
            release_id='${rid}'; \
            archive=\"${PROD_PATH}/incoming/${rid}.tar.gz\"; \
            release_dir=\"${PROD_PATH}/releases/${rid}\"; \
            mkdir -p \"$release_dir\"; \
            tar -xzf \"$archive\" -C \"$release_dir\"; \
            bash \"$release_dir/deploy/scripts/deploy_release.sh\" \
              --base-path \"$base\" \
              --release-id \"$release_id\" \
              --backend-service \"${BACKEND_SERVICE}\" \
              --health-url \"${HEALTH_URL}\" \
              --frontend-url \"${FRONTEND_URL}\" \
              --keep-releases 5 \
              --reload-nginx 1"
