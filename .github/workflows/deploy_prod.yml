name: Deploy (Production 8506/8507)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/SHA)"
        required: true
        default: "main"
      release_id:
        description: "Release id (leave empty to auto-generate)"
        required: false
        default: ""
      configure_gee:
        description: "Auto-configure GEE service account on server (requires secrets EE_SERVICE_ACCOUNT + EE_PRIVATE_KEY_JSON_B64)"
        required: false
        default: "true"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    env:
      PROD_PATH: ${{ secrets.PROD_PATH }}
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
      BACKEND_SERVICE: ${{ secrets.PROD_BACKEND_SERVICE || 'oneearth-v6-backend-8507' }}
      HEALTH_URL: ${{ secrets.PROD_HEALTH_URL || 'http://127.0.0.1:8507/health' }}
      FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL || 'http://127.0.0.1:8506/' }}
      EE_SERVICE_ACCOUNT: ${{ secrets.EE_SERVICE_ACCOUNT }}
      EE_PRIVATE_KEY_JSON_B64: ${{ secrets.EE_PRIVATE_KEY_JSON_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Compute release id
        id: rel
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=8 HEAD)"
          ts="$(date -u +'%Y%m%d_%H%M%S')"
          if [ -n "${{ inputs.release_id }}" ]; then
            rid="${{ inputs.release_id }}"
          else
            rid="${ts}_${short_sha}"
          fi
          echo "release_id=$rid" >> "$GITHUB_OUTPUT"
          echo "Resolved release_id=$rid"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Backend tests (fast stubs)
        run: make test-fast

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Frontend build
        working-directory: frontend
        env:
          VITE_ACCESS_PASSWORD: ${{ secrets.VITE_ACCESS_PASSWORD }}
          # Cesium Ion / Photorealistic 3D Tiles (build-time injection)
          VITE_CESIUM_TOKEN: ${{ secrets.VITE_CESIUM_TOKEN }}
          VITE_ION_PHOTOREALISTIC_ASSET_ID: ${{ secrets.VITE_ION_PHOTOREALISTIC_ASSET_ID }}
          VITE_ION_PROXY: ${{ secrets.VITE_ION_PROXY }}
        run: npm run build

      - name: Create release archive
        id: pkg
        run: |
          set -euo pipefail
          rid="${{ steps.rel.outputs.release_id }}"
          archive="release_${rid}.tar.gz"

          tar -czf "$archive" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='backend/venv' \
            --exclude='frontend/node_modules' \
            --exclude='logs' \
            --exclude='**/__pycache__' \
            --exclude='**/.pytest_cache' \
            backend frontend/dist deploy run_backend.sh run_prod_single.sh Makefile pytest.ini README.md QUICK_REFERENCE.md

          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "Created $archive"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error

      - name: Start ssh-agent + add deploy key
        shell: bash
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_KEY_B64: ${{ secrets.PROD_SSH_KEY_B64 }}
          PROD_SSH_PASSPHRASE: ${{ secrets.PROD_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Start agent and persist env for later steps.
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          key_path="$HOME/.ssh/id_oneearth_deploy"

          if [ -n "${PROD_SSH_KEY_B64}" ]; then
            echo "Using PROD_SSH_KEY_B64"
            echo "$PROD_SSH_KEY_B64" | base64 -d > "$key_path"
          else
            echo "Using PROD_SSH_KEY"
            if [ -z "${PROD_SSH_KEY}" ]; then
              echo "❌ Missing PROD_SSH_KEY (or PROD_SSH_KEY_B64)"
              exit 1
            fi
            printf '%s' "$PROD_SSH_KEY" > "$key_path"
          fi

          # Normalize possible CRLF (common when copying secrets from Windows).
          sed -i 's/\r$//' "$key_path"

          # If the secret was stored as a single line with literal \n sequences, fix it.
          python -c 'import pathlib; p=pathlib.Path("'"$key_path"'"); s=p.read_text(); s=s.replace("\\\\n","\n"); p.write_text(s)'

          # Ensure trailing newline (some copy/paste paths may omit it).
          tail -c 1 "$key_path" | read -r _ || echo >> "$key_path"
          chmod 600 "$key_path"

          # Validate key format early for clearer errors.
          if [ -z "${PROD_SSH_PASSPHRASE}" ]; then
            if ! ssh-keygen -y -f "$key_path" >/dev/null 2>&1; then
              echo "❌ SSH private key could not be parsed (common causes: encrypted key without passphrase, pasted .pub instead of private key, key stored with literal \\n, or truncated key)."
              echo "   First line: $(head -n 1 "$key_path" | tr -d '\r')"
              echo "   Last line:  $(tail -n 1 "$key_path" | tr -d '\r')"
              echo "   Fix options:"
              echo "    - Prefer setting PROD_SSH_KEY_B64 (base64 of the full private key)"
              echo "    - If the key is encrypted, set PROD_SSH_PASSPHRASE or use an unencrypted deploy key"
              exit 1
            fi
          fi

          # Add key to agent (supports optional passphrase via SSH_ASKPASS).
          if [ -n "${PROD_SSH_PASSPHRASE}" ]; then
            askpass="$RUNNER_TEMP/ssh-askpass.sh"
            printf '%s\n' '#!/usr/bin/env sh' 'echo "$PROD_SSH_PASSPHRASE"' > "$askpass"
            chmod 700 "$askpass"
            DISPLAY=:0 SSH_ASKPASS="$askpass" SSH_ASKPASS_REQUIRE=force ssh-add "$key_path" </dev/null
          else
            ssh-add "$key_path"
          fi

          echo "SSH agent keys:"
          ssh-add -l || true

      - name: Add known hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.PROD_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.PROD_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PROD_SSH_PORT}" -H "${PROD_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Upload archive to server
        run: |
          set -euo pipefail
          rid="${{ steps.rel.outputs.release_id }}"
          archive="${{ steps.pkg.outputs.archive }}"
          remote_incoming="${PROD_PATH}/incoming"
          key_path="$HOME/.ssh/id_oneearth_deploy"
          echo "PROD_USER=${PROD_USER}"
          echo "PROD_HOST=${PROD_HOST}"
          ssh -vvv -p "${PROD_SSH_PORT}" -i "$key_path" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no "${PROD_USER}@${PROD_HOST}" "echo ok" || true
          ssh -p "${PROD_SSH_PORT}" -i "$key_path" -o IdentitiesOnly=yes -o BatchMode=yes "${PROD_USER}@${PROD_HOST}" "mkdir -p '${remote_incoming}' '${PROD_PATH}/releases'"
          scp -P "${PROD_SSH_PORT}" -i "$key_path" -o IdentitiesOnly=yes -o BatchMode=yes "$archive" "${PROD_USER}@${PROD_HOST}:${remote_incoming}/${rid}.tar.gz"

      - name: Configure GEE service account (optional)
        if: ${{ inputs.configure_gee == 'true' && env.EE_SERVICE_ACCOUNT != '' && env.EE_PRIVATE_KEY_JSON_B64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          key_path="$HOME/.ssh/id_oneearth_deploy"

          tmp_key_json="$RUNNER_TEMP/ee-service-account.json"
          if [ -z "${EE_SERVICE_ACCOUNT:-}" ] || [ -z "${EE_PRIVATE_KEY_JSON_B64:-}" ]; then
            echo "❌ Missing EE_SERVICE_ACCOUNT / EE_PRIVATE_KEY_JSON_B64 secrets"
            exit 1
          fi

          umask 077

          # Decode secret WITHOUT printing it.
          # Supported formats for EE_PRIVATE_KEY_JSON_B64:
          #  - Base64 of the JSON file (recommended)
          #  - Raw JSON (if you accidentally pasted JSON into the secret)
          raw="$EE_PRIVATE_KEY_JSON_B64"
          # Some people paste JSON wrapped in a single pair of quotes; handle that.
          raw_trimmed="$(printf '%s' "$raw" | tr -d '\r' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          if [ "${raw_trimmed#\"}" != "$raw_trimmed" ] && [ "${raw_trimmed%\"}" != "$raw_trimmed" ]; then
            raw_unquoted="${raw_trimmed#\"}"
            raw_unquoted="${raw_unquoted%\"}"
          else
            raw_unquoted="$raw_trimmed"
          fi

          first_non_ws="$(printf '%s' "$raw_unquoted" | tr '\n' ' ' | sed -E 's/^[[:space:]]+//' | cut -c1 || true)"
          echo "GEE key secret: first_char='${first_non_ws:-?}', length=${#raw_unquoted}"

          if [ "$first_non_ws" = "{" ]; then
            printf '%s' "$raw_unquoted" > "$tmp_key_json"
          else
            # Strip all whitespace to tolerate line-wrapped base64.
            # Try standard base64 first, then URL-safe base64 (common copy/paste variant).
            b64="$(printf '%s' "$raw_unquoted" | tr -d '[:space:]')"
            # Some pastes wrap base64 in quotes or add other non-base64 characters.
            # Keep only base64/base64url alphabet + '='.
            b64="$(printf '%s' "$b64" | tr -cd 'A-Za-z0-9+/=_-')"
            # If someone pasted the secret with surrounding quotes, strip a single pair.
            if [ "${b64#\"}" != "$b64" ] && [ "${b64%\"}" != "$b64" ]; then
              b64="${b64#\"}"
              b64="${b64%\"}"
            fi
            # Some base64 encoders omit padding '='; add it back if needed.
            pad=$(( (4 - (${#b64} % 4)) % 4 ))
            if [ "$pad" -ne 0 ]; then
              padding="$(printf '%*s' "$pad" '')"
              padding="${padding// /=}"
              b64_padded="${b64}${padding}"
            else
              b64_padded="$b64"
            fi
            if ! printf '%s' "$b64_padded" | base64 --decode > "$tmp_key_json" 2>/dev/null; then
              if ! printf '%s' "$b64_padded" | tr '_-' '/+' | base64 --decode > "$tmp_key_json" 2>/dev/null; then
                echo "❌ EE_PRIVATE_KEY_JSON_B64 is neither raw JSON nor valid base64 JSON"
                echo "   Fix options:"
                echo "   - Paste the full service-account JSON as the secret value (raw JSON), OR"
                echo "   - Set the secret to: base64 -w 0 <key.json>"
                exit 1
              fi
            fi
          fi
          if [ ! -s "$tmp_key_json" ]; then
            echo "❌ Decoded key JSON is empty (check EE_PRIVATE_KEY_JSON_B64 secret)"
            exit 1
          fi
          chmod 600 "$tmp_key_json"

          # Sanity check: valid JSON + matches service account email.
          export TMP_KEY_JSON="$tmp_key_json"
          python -c "import json, os; from pathlib import Path; p=Path(os.environ['TMP_KEY_JSON']); data=json.loads(p.read_text(encoding='utf-8')); t=data.get('type'); assert t=='service_account', f'Unexpected key type: {t!r}'; client=str(data.get('client_email','')).strip(); expected=str(os.environ.get('EE_SERVICE_ACCOUNT','')).strip(); assert (not expected) or (not client) or (client==expected), f'client_email mismatch: {client} != {expected}'" >/dev/null

          # Upload to /tmp then install into PROD_PATH/secure (no sudo)
          scp -P "${PROD_SSH_PORT}" -i "$key_path" -o IdentitiesOnly=yes -o BatchMode=yes \
            "$tmp_key_json" "${PROD_USER}@${PROD_HOST}:/tmp/ee-service-account.json"

          ssh -p "${PROD_SSH_PORT}" -i "$key_path" -o IdentitiesOnly=yes -o BatchMode=yes "${PROD_USER}@${PROD_HOST}" \
            "set -euo pipefail; \
             umask 077; \
             base='${PROD_PATH}'; \
             if [ ! -d \"\$base\" ]; then echo '❌ PROD_PATH does not exist on server.'; echo \"   base=\$base\"; exit 1; fi; \
             if [ ! -w \"\$base\" ]; then echo '❌ No write permission for PROD_PATH (cannot create secure/ or .env.prod).'; echo \"   base=\$base\"; ls -ld \"\$base\" || true; exit 1; fi; \
             key_dst=\"\$base/secure/ee-service-account.json\"; \
             env_file=\"\$base/.env.prod\"; \
             install -d -m 700 \"\$base/secure\" || { echo '❌ Cannot create secure dir. Ensure deploy user owns PROD_PATH, or grant sudo for /usr/bin/install.'; exit 1; }; \
             install -m 600 /tmp/ee-service-account.json \"\$key_dst\" || { echo '❌ Cannot install key file. Check permissions under PROD_PATH/secure.'; exit 1; }; \
             rm -f /tmp/ee-service-account.json || true; \
             bash -lc \"set -euo pipefail; \
               touch '\$env_file'; \
               if grep -q '^EE_SERVICE_ACCOUNT=' '\$env_file'; then \
                 sed -i \\\"s|^EE_SERVICE_ACCOUNT=.*$|EE_SERVICE_ACCOUNT=${EE_SERVICE_ACCOUNT}|\\\" '\$env_file'; \
               else \
                 printf '\\nEE_SERVICE_ACCOUNT=%s\\n' '${EE_SERVICE_ACCOUNT}' >> '\$env_file'; \
               fi; \
               if grep -q '^EE_PRIVATE_KEY_FILE=' '\$env_file'; then \
                 sed -i \\\"s|^EE_PRIVATE_KEY_FILE=.*$|EE_PRIVATE_KEY_FILE=\\\"\$key_dst\\\"|\\\" '\$env_file'; \
               else \
                 printf 'EE_PRIVATE_KEY_FILE=%s\\n' '\$key_dst' >> '\$env_file'; \
               fi\""

        env:
          TMP_KEY_JSON: ${{ runner.temp }}/ee-service-account.json

      - name: Deploy on server (extract + switch + restart + healthcheck)
        run: |
          set -euo pipefail
          rid="${{ steps.rel.outputs.release_id }}"
          key_path="$HOME/.ssh/id_oneearth_deploy"
          ssh -p "${PROD_SSH_PORT}" -i "$key_path" -o IdentitiesOnly=yes -o BatchMode=yes "${PROD_USER}@${PROD_HOST}" "set -euo pipefail; \
            export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin; \
            echo '== remote context =='; \
            echo REMOTE_USER=\$(whoami); \
            id || true; \
            groups || true; \
            echo '== sudo check (force no timestamp) =='; \
            sudo -k || true; \
            if sudo -n -l >/dev/null 2>&1; then echo 'SUDO_N_L_OK=1'; else echo 'SUDO_N_L_OK=0'; fi; \
            sudo -n -l || true; \
            echo '== deploy =='; \
            base='${PROD_PATH}'; \
            release_id='${rid}'; \
            archive=\"${PROD_PATH}/incoming/${rid}.tar.gz\"; \
            release_dir=\"${PROD_PATH}/releases/${rid}\"; \
            mkdir -p \"\$release_dir\"; \
            tar -xzf \"\$archive\" -C \"\$release_dir\"; \
            bash \"\$release_dir/deploy/scripts/deploy_release.sh\" \
              --base-path \"\$base\" \
              --release-id \"\$release_id\" \
              --backend-service \"${BACKEND_SERVICE}\" \
              --health-url \"${HEALTH_URL}\" \
              --frontend-url \"${FRONTEND_URL}\" \
              --keep-releases 5 \
              --reload-nginx 1"
