name: oneearth-021-dev

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    network_mode: host
    env_file:
      - ${ONEEARTH_ENV_FILE:-../.env}
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8405
      ONEEARTH_PROFILE: "021"
      ONEEARTH_DEPLOYMENT: dev
      ONEEARTH_RELEASE_SHA: ${ONEEARTH_RELEASE_SHA:-}
    volumes:
      - ../backend:/app/backend
      - ../tests:/app/tests:ro
      - ../pytest.ini:/app/pytest.ini:ro
      - ${ONEEARTH_ENV_FILE:-../.env}:/app/.env:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    network_mode: host
    env_file:
      - ${ONEEARTH_ENV_FILE:-../.env}
    environment:
      API_HOST: 127.0.0.1
      API_PORT: 8405
      FRONTEND_PORT: 8404
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  # Isolated test runners (no bind-mounts).
  backend_test:
    build:
      context: ..
      dockerfile: Dockerfile.pytest

  frontend_test:
    build:
      context: ../frontend
      dockerfile: Dockerfile.test

volumes:
  frontend_node_modules:
